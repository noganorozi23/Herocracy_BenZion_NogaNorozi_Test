<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דמוקרטיה בבית - משחק רב משתתפים</title>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --background: #f0f9ff;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        #game-container {
            background: var(--card-bg);
            max-width: 900px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 14px;
            padding: 6px;
            width: auto;
            margin: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }

        .participants {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .tag {
            background: #e5e7eb;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tag.ready {
            background: var(--success);
            color: white;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            min-height: 120px;
        }

        .opt {
            border: 3px solid #e5e7eb;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .opt:hover {
            border-color: var(--secondary);
            background: #fffbeb;
        }

        .opt.selected {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .opt-icon {
            font-size: 40px;
            display: block;
        }

        .kalpi-area {
            position: relative;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }

        .kalpi-box {
            font-size: 60px;
            z-index: 10;
        }

        .flying-item {
            position: absolute;
            font-size: 30px;
            z-index: 5;
            transition: all 0.8s cubic-bezier(0.5, -0.5, 0.5, 1.5);
            pointer-events: none;
        }

        .result-row {
            text-align: right;
            margin-bottom: 15px;
        }

        .bar-bg {
            background: #eee;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar-fill {
            background: var(--primary);
            height: 100%;
            width: 0;
            transition: width 1s ease;
        }

        .room-code-badge {
            background: #f3f4f6;
            padding: 5px 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="header">
            <h2>הרוב קובע! 🗳️</h2>
        </div>

        <div class="content">
            <!-- מסך 1: כניסה -->
            <div id="screen-login" class="screen active">
                <h3>ברוכים הבאים למשחק הבחירות!</h3>
                <p>הכניסו את השמות שלכם (2 שחקנים):</p>
                <input type="text" id="input-p1" placeholder="שם שחקן 1 (למשל אבא)">
                <input type="text" id="input-p2" placeholder="שם שחקן 2 (למשל דנה)">
                <button class="btn" id="btn-login" onclick="startGame()">בואו נתחיל!</button>
                <div id="login-error" class="error-msg"></div>
            </div>

            <!-- מסך 2: תור -->
            <div id="screen-game" class="screen">
                <div class="room-code-badge" id="turn-badge">תור: <span id="span-turn-name"></span></div>
                
                <h3 id="h3-question">טוען שאלה...</h3>

                <div class="kalpi-area" id="kalpi-area">
                    <div class="kalpi-box">🗳️</div>
                </div>

                <div class="options" id="div-options">
                    <!-- יתמלא ע"י JS -->
                </div>

                <button class="btn" id="btn-vote" disabled onclick="submitVote()">הצבעתי! ✔️</button>
            </div>

            <!-- מסך 3: העברת תור -->
            <div id="screen-pass" class="screen">
                <span style="font-size: 60px;">🙈</span>
                <h3>ההצבעה נקלטה בחשאי!</h3>
                <p id="p-pass-msg">העבירו את השליטה לשחקן הבא כדי שיוכל להצביע בלי שתראו.</p>
                <button class="btn" onclick="nextTurn()">אני מוכן, בואו נמשיך</button>
            </div>

            <!-- מסך 4: תוצאות -->
            <div id="screen-results" class="screen">
                <h3 id="h3-winner-msg">התוצאות הגיעו!</h3>
                <div id="div-results-bars" style="text-align: right;"></div>
                <button class="btn" id="btn-next" onclick="advanceRound()" style="margin-top:20px;">לשאלה הבאה</button>
            </div>

            <!-- מסך 5: סיום -->
            <div id="screen-finish" class="screen">
                <span style="font-size: 60px;">🏆</span>
                <h3>כל הכבוד!</h3>
                <p>למדתם איך הרוב קובע ומחליט יחד.</p>
                <button class="btn" onclick="restartGame()">שחק שוב</button>
            </div>
        </div>
    </div>

    <script>
        const scenarios = [
            { q: "מה נאכל היום לארוחת ערב?", options: [{ id: 'a', label: "פיצה", icon: "🍕" }, { id: 'b', label: "סלט", icon: "🥗" }] },
            { q: "לאן נצא לטייל בשבת?", options: [{ id: 'a', label: "פארק שעשועים", icon: "🎡" }, { id: 'b', label: "טיול בטבע", icon: "🌳" }] },
            { q: "באיזה משחק נשחק כולם יחד?", options: [{ id: 'a', label: "מחבואים", icon: "🙈" }, { id: 'b', label: "משחק קופסה", icon: "🎲" }] }
        ];

        let state = {
            p1: "",
            p2: "",
            round: 0,
            currentTurn: 1, // 1 or 2
            selectedId: null,
            votes: { 1: null, 2: null }
        };

        function startGame() {
            const p1 = document.getElementById('input-p1').value.trim();
            const p2 = document.getElementById('input-p2').value.trim();
            const errorDiv = document.getElementById('login-error');

            if (!p1 || !p2) {
                errorDiv.innerText = "נא להזין את שני השמות.";
                return;
            }
            errorDiv.innerText = "";

            state.p1 = p1;
            state.p2 = p2;
            state.round = 0;
            state.currentTurn = 1;
            state.votes = { 1: null, 2: null };

            startRound();
        }

        function startRound() {
            state.currentTurn = 1;
            state.votes = { 1: null, 2: null };
            state.selectedId = null;
            renderTurn();
        }

        function renderTurn() {
            const scene = scenarios[state.round];
            if (!scene) return;

            const playerName = state.currentTurn === 1 ? state.p1 : state.p2;
            document.getElementById('span-turn-name').innerText = playerName;
            document.getElementById('h3-question').innerText = scene.q;

            const container = document.getElementById('div-options');
            container.innerHTML = "";

            scene.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "opt";
                div.id = `opt-${opt.id}`;
                div.innerHTML = `<span class="opt-icon">${opt.icon}</span><strong>${opt.label}</strong>`;
                div.onclick = () => {
                    state.selectedId = opt.id;
                    document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    document.getElementById('btn-vote').disabled = false;
                };
                container.appendChild(div);
            });

            document.getElementById('btn-vote').disabled = true;
            showScreen('screen-game');
        }

        function submitVote() {
            if (!state.selectedId) return;
            
            // לשמור את ההצבעה
            state.votes[state.currentTurn] = state.selectedId;

            // אנימציה קטנה
            const scene = scenarios[state.round];
            const opt = scene.options.find(o => o.id === state.selectedId);
            if (opt) animateToKalpi(opt.icon);

            document.getElementById('btn-vote').disabled = true;

            // להמתין שהאנימציה תסתיים (כ-1 שניה) ואז להמשיך
            setTimeout(() => {
                if (state.currentTurn === 1) {
                    // לעבור לשחקן 2
                    state.currentTurn = 2;
                    state.selectedId = null;
                    document.getElementById('p-pass-msg').innerText = `העבירו את השליטה ל-${state.p2} כדי שיוכל להצביע בלי שתראו.`;
                    showScreen('screen-pass');
                } else {
                    // סיימנו להצביע
                    showResults();
                }
            }, 1000);
        }

        function nextTurn() {
            renderTurn();
        }

        function animateToKalpi(icon) {
            const area = document.getElementById('kalpi-area');
            const item = document.createElement('div');
            item.className = "flying-item";
            item.innerText = icon;
            item.style.bottom = "-50px";
            item.style.left = Math.random() * 80 + 10 + "%";
            area.appendChild(item);

            setTimeout(() => {
                item.style.bottom = "50px";
                item.style.left = "50%";
                item.style.transform = "translateX(-50%) scale(0)";
                item.style.opacity = "0";
            }, 50);
            setTimeout(() => item.remove(), 1000);
        }

        function showResults() {
            const scene = scenarios[state.round];
            const v1 = state.votes[1];
            const v2 = state.votes[2];
            
            const opt1 = scene.options.find(o => o.id === v1);
            const opt2 = scene.options.find(o => o.id === v2);

            let title = "";
            if (v1 === v2) {
                title = `הסכמה פה אחד! כולם בחרו: ${opt1.label} ${opt1.icon}`;
            } else {
                title = "תיקו! כל אחד בחר משהו אחר 🤝";
            }
            
            document.getElementById('h3-winner-msg').innerText = title;

            const container = document.getElementById('div-results-bars');
            container.innerHTML = `
                <div style="margin-top: 15px; font-size: 18px; padding: 15px; background: #eef2ff; border-radius: 10px; border: 2px solid var(--primary);">
                    <strong>${state.p1}</strong> הצביע/ה ל: ${opt1.icon} ${opt1.label}
                </div>
                <div style="margin-top: 15px; font-size: 18px; padding: 15px; background: #fffbeb; border-radius: 10px; border: 2px solid var(--secondary);">
                    <strong>${state.p2}</strong> הצביע/ה ל: ${opt2.icon} ${opt2.label}
                </div>
            `;

            // לבדוק אם יש עוד סיבובים
            if (state.round >= scenarios.length - 1) {
                document.getElementById('btn-next').innerText = "סיים משחק";
            } else {
                document.getElementById('btn-next').innerText = "לשאלה הבאה";
            }

            showScreen('screen-results');
        }

        function advanceRound() {
            if (state.round >= scenarios.length - 1) {
                showScreen('screen-finish');
            } else {
                state.round++;
                startRound();
            }
        }

        function restartGame() {
            state.round = 0;
            state.currentTurn = 1;
            state.selectedId = null;
            state.votes = { 1: null, 2: null };
            
            document.getElementById('input-p1').value = "";
            document.getElementById('input-p2').value = "";
            showScreen('screen-login');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>

</body>

</html>

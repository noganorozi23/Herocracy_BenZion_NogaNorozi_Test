<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דמוקרטיה בבית - משחק רב משתתפים</title>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --background: #f0f9ff;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #game-container {
            background: var(--card-bg);
            max-width: 500px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 14px;
            padding: 6px;
            width: auto;
            margin: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }

        .participants {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .tag {
            background: #e5e7eb;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tag.ready {
            background: var(--success);
            color: white;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            min-height: 120px;
        }

        .opt {
            border: 3px solid #e5e7eb;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .opt:hover {
            border-color: var(--secondary);
            background: #fffbeb;
        }

        .opt.selected {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .opt-icon {
            font-size: 40px;
            display: block;
        }

        .kalpi-area {
            position: relative;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }

        .kalpi-box {
            font-size: 60px;
            z-index: 10;
        }

        .flying-item {
            position: absolute;
            font-size: 30px;
            z-index: 5;
            transition: all 0.8s cubic-bezier(0.5, -0.5, 0.5, 1.5);
            pointer-events: none;
        }

        .result-row {
            text-align: right;
            margin-bottom: 15px;
        }

        .bar-bg {
            background: #eee;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar-fill {
            background: var(--primary);
            height: 100%;
            width: 0;
            transition: width 1s ease;
        }

        .room-code-badge {
            background: #f3f4f6;
            padding: 5px 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="header">
            <h2>הרוב קובע! 🗳️</h2>
        </div>

        <div class="content">
            <!-- מסך 1: כניסה -->
            <div id="screen-login" class="screen active">
                <h3>ברוכים הבאים למשחק הבחירות!</h3>
                <p>איך קוראים לכם?</p>
                <input type="text" id="input-name" placeholder="השם שלכם">
                <button class="btn" id="btn-login" onclick="handleLogin()">המשך</button>
            </div>

            <!-- מסך 2: לובי -->
            <div id="screen-lobby" class="screen">
                <h3>היי <span id="span-user-name"></span>!</h3>
                <button id="btn-create-room" class="btn" onclick="createRoom()">צור חדר חדש</button>
                <div style="margin: 20px 0; border-top: 1px solid #ddd; padding-top: 20px;">
                    <p>או הכנס קוד חדר שקיבלת:</p>
                    <input type="number" id="input-room-id" placeholder="קוד חדר (4 ספרות)">
                    <button id="btn-join-room" class="btn btn-secondary" onclick="joinRoom()">הצטרף לחדר</button>
                    <div id="lobby-error" class="error-msg"></div>
                </div>
            </div>

            <!-- מסך 3: המשחק -->
            <div id="screen-game" class="screen">
                <div class="room-code-badge">חדר: <span id="span-room-id"></span></div>
                <button class="btn-outline" onclick="copyRoomCode()">העתק קוד 📋</button>

                <div class="participants" id="div-participants"></div>

                <h3 id="h3-question">טוען שאלה...</h3>

                <div class="kalpi-area" id="kalpi-area">
                    <div class="kalpi-box">🗳️</div>
                </div>

                <div class="options" id="div-options">
                    <!-- יתמלא ע"י JS -->
                </div>

                <button class="btn" id="btn-vote" disabled onclick="submitVote()">אני מצביע/ה!</button>
                <div id="div-waiting" style="display:none; color: var(--primary); font-weight:bold; margin-top:10px;">
                    ממתינים לשאר המצביעים... ⏳
                </div>
            </div>

            <!-- מסך 4: תוצאות -->
            <div id="screen-results" class="screen">
                <h3 id="h3-winner-msg">התוצאות הגיעו!</h3>
                <div id="div-results-bars"></div>
                <button class="btn" id="btn-next" style="display:none;" onclick="advanceRound()">לשלב הבא</button>
                <p id="p-waiting-next" style="margin-top:15px; color:#666;">ממתינים למנהל החדר שימשיך...</p>
            </div>

            <!-- מסך 5: סיום -->
            <div id="screen-finish" class="screen">
                <span style="font-size: 60px;">🏆</span>
                <h3>כל הכבוד!</h3>
                <p>למדתם איך הרוב קובע ומחליט יחד.</p>
                <button class="btn" onclick="restartGame()">שחק שוב</button>
            </div>
        </div>
    </div>

    <script>
        // Robust App ID detection
        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'democracy-game-shared';
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const scenarios = [
            { q: "מה נאכל היום לארוחת ערב?", options: [{ id: 'a', label: "פיצה", icon: "🍕" }, { id: 'b', label: "סלט", icon: "🥗" }] },
            { q: "לאן נצא לטייל בשבת?", options: [{ id: 'a', label: "פארק שעשועים", icon: "🎡" }, { id: 'b', label: "טיול בטבע", icon: "🌳" }] },
            { q: "באיזה משחק נשחק כולם יחד?", options: [{ id: 'a', label: "מחבואים", icon: "🙈" }, { id: 'b', label: "משחק קופסה", icon: "🎲" }] }
        ];

        let state = {
            name: "",
            uid: "",
            roomId: "",
            round: -1,
            selectedId: null,
            voted: false,
            isAdmin: false,
            processedVotes: new Set()
        };

        async function handleLogin() {
            state.name = document.getElementById('input-name').value.trim();
            if (!state.name) return;

            const loginBtn = document.getElementById('btn-login');
            loginBtn.disabled = true;
            loginBtn.innerText = "מתחבר...";

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                state.uid = auth.currentUser.uid;
                document.getElementById('span-user-name').innerText = state.name;
                showScreen('screen-lobby');
            } catch (e) {
                console.error(e);
                loginBtn.disabled = false;
                loginBtn.innerText = "המשך";
            }
        }

        async function createRoom() {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            const createBtn = document.getElementById('btn-create-room');
            createBtn.disabled = true;
            createBtn.innerText = "יוצר חדר...";

            const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${id}`);
            state.isAdmin = true;

            try {
                await roomRef.set({
                    round: 0,
                    adminId: state.uid,
                    participants: { [state.uid]: state.name },
                    votes: {}, // מפה ריקה של הצבעות
                    lastUpdate: Date.now()
                });
                enterRoom(id);
            } catch (e) {
                console.error(e);
                createBtn.disabled = false;
                createBtn.innerText = "צור חדר חדש";
            }
        }

        async function joinRoom() {
            const idInput = document.getElementById('input-room-id');
            const id = idInput.value.trim();
            if (!id) return;

            const joinBtn = document.getElementById('btn-join-room');
            const errorDiv = document.getElementById('lobby-error');

            joinBtn.disabled = true;
            joinBtn.innerText = "מחפש חדר...";
            errorDiv.innerText = "";

            const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${id}`);
            try {
                const snap = await roomRef.get();
                if (snap.exists) {
                    await roomRef.update({
                        [`participants.${state.uid}`]: state.name
                    });
                    state.isAdmin = false;
                    enterRoom(id);
                } else {
                    errorDiv.innerText = "החדר לא נמצא. וודאו שהקוד נכון.";
                    joinBtn.disabled = false;
                    joinBtn.innerText = "הצטרף לחדר";
                }
            } catch (e) {
                console.error(e);
                errorDiv.innerText = "שגיאה בחיבור לחדר.";
                joinBtn.disabled = false;
                joinBtn.innerText = "הצטרף לחדר";
            }
        }

        function enterRoom(id) {
            state.roomId = id;
            document.getElementById('span-room-id').innerText = id;
            showScreen('screen-game');
            startListener();
        }

        function startListener() {
            if (!state.roomId) return;
            db.doc(`artifacts/${appId}/public/data/rooms/${state.roomId}`).onSnapshot(doc => {
                const data = doc.data();
                if (!data) return;

                updateParticipantsUI(data);

                if (data.round !== state.round) {
                    state.round = data.round;
                    state.voted = false;
                    state.selectedId = null;
                    state.processedVotes.clear();

                    if (state.round < scenarios.length) {
                        renderRound();
                        showScreen('screen-game');
                    } else {
                        showScreen('screen-finish');
                    }
                }

                syncVotes(data.votes);
                checkVotingProgress(data);
            }, error => {
                console.error("Snapshot error:", error);
            });
        }

        function updateParticipantsUI(data) {
            const container = document.getElementById('div-participants');
            container.innerHTML = "";
            const participants = data.participants || {};
            const votes = data.votes || {};

            Object.keys(participants).forEach(uid => {
                // בדיקה האם המשתמש הצביע בסיבוב הנוכחי
                const hasVotedThisRound = votes[uid] && votes[uid].round === state.round;
                const tag = document.createElement('div');
                tag.className = `tag ${hasVotedThisRound ? 'ready' : ''}`;
                tag.innerText = participants[uid] + (hasVotedThisRound ? " ✅" : "");
                container.appendChild(tag);
            });
        }

        function renderRound() {
            const scene = scenarios[state.round];
            if (!scene) return;

            document.getElementById('h3-question').innerText = scene.q;
            const container = document.getElementById('div-options');
            container.innerHTML = "";

            scene.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "opt";
                div.id = `opt-${opt.id}`;
                div.innerHTML = `<span class="opt-icon">${opt.icon}</span><strong>${opt.label}</strong>`;
                div.onclick = () => {
                    if (state.voted) return;
                    state.selectedId = opt.id;
                    document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    document.getElementById('btn-vote').disabled = false;
                };
                container.appendChild(div);
            });

            document.getElementById('btn-vote').style.display = "block";
            document.getElementById('btn-vote').disabled = true;
            document.getElementById('div-waiting').style.display = "none";
        }

        async function submitVote() {
            if (!state.selectedId || state.voted) return;
            state.voted = true;
            document.getElementById('btn-vote').style.display = "none";
            document.getElementById('div-waiting').style.display = "block";

            const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${state.roomId}`);
            await roomRef.update({
                [`votes.${state.uid}`]: { choice: state.selectedId, round: state.round }
            });
        }

        function syncVotes(votes) {
            if (!votes) return;
            Object.entries(votes).forEach(([uid, vote]) => {
                if (vote.round === state.round && !state.processedVotes.has(uid)) {
                    state.processedVotes.add(uid);
                    const scene = scenarios[state.round];
                    if (scene) {
                        const opt = scene.options.find(o => o.id === vote.choice);
                        if (opt) animateToKalpi(opt.icon);
                    }
                }
            });
        }

        function animateToKalpi(icon) {
            const area = document.getElementById('kalpi-area');
            const item = document.createElement('div');
            item.className = "flying-item";
            item.innerText = icon;
            item.style.bottom = "-50px";
            item.style.left = Math.random() * 80 + 10 + "%";
            area.appendChild(item);

            setTimeout(() => {
                item.style.bottom = "50px";
                item.style.left = "50%";
                item.style.transform = "translateX(-50%) scale(0)";
                item.style.opacity = "0";
            }, 50);
            setTimeout(() => item.remove(), 1000);
        }

        function checkVotingProgress(data) {
            const participants = data.participants || {};
            const pCount = Object.keys(participants).length;
            const currentVotes = Object.values(data.votes || {}).filter(v => v.round === state.round);

            if (currentVotes.length > 0 && currentVotes.length === pCount) {
                showResults(currentVotes, data);
            }
        }

        function showResults(votes, data) {
            showScreen('screen-results');
            const counts = { a: 0, b: 0 };
            votes.forEach(v => counts[v.choice]++);

            const scene = scenarios[state.round];
            const container = document.getElementById('div-results-bars');
            container.innerHTML = "";

            const winner = counts.a >= counts.b ? scene.options[0] : scene.options[1];
            document.getElementById('h3-winner-msg').innerText = `הרוב קבע: ${winner.label} ${winner.icon}`;

            scene.options.forEach(opt => {
                const count = counts[opt.id];
                const total = votes.length || 1;
                const perc = (count / total) * 100;
                container.innerHTML += `
                <div class="result-row">
                    <strong>${opt.label} (${count})</strong>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${perc}%"></div></div>
                </div>
            `;
            });

            if (state.isAdmin) {
                document.getElementById('btn-next').style.display = "block";
                document.getElementById('p-waiting-next').style.display = "none";
            } else {
                document.getElementById('btn-next').style.display = "none";
                document.getElementById('p-waiting-next').style.display = "block";
            }
        }

        async function advanceRound() {
            if (!state.isAdmin) return;
            const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${state.roomId}`);

            // איפוס מפת ההצבעות כדי שהווי הירוק יעלם לכולם בסיבוב הבא
            await roomRef.update({
                round: state.round + 1,
                votes: {}
            });
        }

        function restartGame() {
            // איפוס המצב המקומי וחזרה ללובי
            state.round = -1;
            state.roomId = "";
            state.isAdmin = false;
            state.voted = false;
            state.selectedId = null;
            state.processedVotes.clear();

            showScreen('screen-lobby');
        }

        function copyRoomCode() {
            const el = document.createElement('textarea');
            el.value = state.roomId;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = document.querySelector('.btn-outline');
            const original = btn.innerText;
            btn.innerText = "הועתק! ✅";
            setTimeout(() => btn.innerText = original, 2000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>

</body>

</html>
